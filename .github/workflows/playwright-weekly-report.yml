name: Playwright weekly report

on:
  schedule:
    - cron: '0 4 * * 1' # every Monday 04:00 UTC
  workflow_dispatch: {}

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate weekly Playwright report
        uses: actions/github-script@v6
        with:
          script: |
            const workflowId = 'playwright.yml';
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              per_page: 50,
            });

            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 7);
            const recent = (data.workflow_runs || []).filter(run => new Date(run.created_at) >= cutoff);

            const summary = { success: 0, failure: 0, cancelled: 0, other: 0 };
            for (const run of recent) {
              const conclusion = (run.conclusion || 'other').toLowerCase();
              if (conclusion === 'success') summary.success += 1;
              else if (conclusion === 'failure' || conclusion === 'timed_out') summary.failure += 1;
              else if (conclusion === 'cancelled') summary.cancelled += 1;
              else summary.other += 1;
            }

            const lines = recent.slice(0, 20).map(run => {
              const created = new Date(run.created_at).toISOString().slice(0, 10);
              const sha = (run.head_sha || '').substring(0, 7);
              const branch = run.head_branch || '';
              const conclusion = run.conclusion || 'unknown';
              const url = run.html_url;
              return `- ${created} ${branch} (${sha}) — ${conclusion} → ${url}`;
            });

            const title = `Weekly Playwright report ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `Zakres: ostatnie 7 dni dla workflow '${workflowId}'.`,
              '',
              `Podsumowanie:`,
              `- success: ${summary.success}`,
              `- failure/timed_out: ${summary.failure}`,
              `- cancelled: ${summary.cancelled}`,
              `- other: ${summary.other}`,
              '',
              `Ostatnie biegi (max 20):`,
              ...lines,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-report','playwright','automated'],
            });
