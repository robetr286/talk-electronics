name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=talk_electronic --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov (optional)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Check formatting with black
      run: black --check talk_electronic/ scripts/ tests/
      continue-on-error: true

    - name: Check imports with isort
      run: isort --check-only talk_electronic/ scripts/ tests/
      continue-on-error: true

    - name: Lint with flake8
      run: |
        # Stop on serious errors (E9, F63, F7, F82)
        flake8 talk_electronic/ scripts/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warnings for other issues
        flake8 talk_electronic/ scripts/ tests/ --count --max-complexity=10 --max-line-length=120 --statistics
      continue-on-error: true
