name: OCR Candidate Tests (DocTR & Surya)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * 0' # weekly on Sunday at 02:00 UTC

jobs:
  ocr-candidates:
    name: OCR candidate imports & smoke
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip (OCR)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ocr-${{ hashFiles('requirements-ocr.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ocr-

      - name: Install OCR dependencies (best-effort)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-ocr.txt ]; then pip install -r requirements-ocr.txt || echo "OCR deps installation failed - tests may be skipped"; else echo "No requirements-ocr.txt present"; fi

      - name: Run OCR candidate tests
        run: |
          pytest -q tests/test_ocr_candidate_models.py -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocr-candidates-artifacts
          path: test-results/**
          if-no-files-found: warn
