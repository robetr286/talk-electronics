# RT-DETR-L Dataset Configuration — Symbole elektroniczne
# Model: Ultralytics RT-DETR-L (HGNet backbone + DETR decoder, PyTorch)
# Dataset: 200 syntetycznych schematów elektronicznych (splits_yolo)
#
# Użycie:
#   python train_rtdetr.py --config configs/rtdetr_symbols.yaml
#   # lub bezpośrednio:
#   from ultralytics import RTDETR
#   model = RTDETR("weights/rtdetr-l.pt")
#   model.train(data="configs/rtdetr_symbols.yaml", epochs=50, imgsz=640)

# Ścieżki do datasetu (format YOLO — Ultralytics RT-DETR akceptuje ten sam format)
path: data/synthetic/splits_yolo
train: train/images
val: val/images
test: test/images

# Klasy (4 symbole elektroniczne)
names:
  0: resistor
  1: capacitor
  2: inductor
  3: diode

nc: 4

# Informacje o datasecie
# ----------------------
# Obrazów: 200 (140 train / 30 val / 30 test)
# Anotacji: 3680 (2608 train / 539 val / 533 test)
# Format anotacji: YOLO segment (txt) — bbox + polygon
# Format COCO JSON: dostępny (train.json, val.json, test.json)
# Balans klas: ~24-26% per kategoria
# Generowane: 13-14.11.2025, batch_generate.py
